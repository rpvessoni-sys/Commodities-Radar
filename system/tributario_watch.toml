# =============================================================================
# Monitor Tributário / Regulatório — catálogo curado de vetores que afetam
# o complexo soja (soja / farelo / óleo de soja), direta ou indiretamente.
#
# Fonte da verdade: este arquivo. `main.py tributario sync` joga pro DB.
# Editável à mão. Cada bloco [[evento]] vira uma linha em `eventos_tributarios`.
#
# Campos:
#   id            identificador estável (não mudar depois de criado)
#   titulo        nome curto
#   tipo          MP | lei | decisao_judicial | regulatorio | programa
#   jurisdicao    BR | EUA | Indonesia | Argentina | global
#   status        vigente | tramitacao | adiado | monitorando | encerrado
#   impacto       direto | indireto
#   direcao       alta | baixa | neutro | misto   (efeito líquido sobre o complexo BR)
#   produtos      lista: soja, farelo, oleo_soja
#   mecanismo     1-2 frases: COMO afeta o preço
#   vigencia_ate  "YYYY-MM-DD" ou "" (data em que expira / precisa renovar)
#   proximo_marco texto do próximo evento a vigiar
#   proximo_data  "YYYY-MM-DD" ou ""
#   fonte_url     link de referência
#   atualizado_em "YYYY-MM-DD"
# =============================================================================

