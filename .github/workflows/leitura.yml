name: Camada de leitura (Claude autonomo)

# FASE 2 — Claude le o briefing do dia e produz a LEITURA (insights/*.md com vies:),
# 100% na nuvem do GitHub (sem o PC do dono), agendado. Abre um PR na branch claude/
# que o guard-leitura.yml valida (so pode tocar insights/). O dono aprova do celular.
#
# Gate de custo: so chama o Claude se a fila no briefing tiver item — em dia sem sinal,
# o run sai de graca. Auth pela ASSINATURA MAX: secret CLAUDE_CODE_OAUTH_TOKEN gerado
# pelo dono com `claude setup-token` (sem conta de API separada).

on:
  schedule:
    - cron: "0 23 * * *"      # ~20h BRT, ~1h apos o daily do robo (que publica o briefing)
  workflow_dispatch:           # botao "Run workflow" pra testar na mao

permissions:
  contents: write              # commitar a branch claude/insights-DATA
  pull-requests: write         # abrir o PR
  id-token: write              # OIDC — exigido pela auth (OAuth) do claude-code-action

concurrency:
  group: leitura
  cancel-in-progress: false

jobs:
  leitura:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # historico completo (pra branch/PR)

      # Gate: so roda o Claude se houver fila. queue_emit imprime "Nada pede leitura
      # hoje" quando a fila esta vazia — nesse caso, pulamos (zero token).
      # Idempotencia: se a branch claude/insights-<DATA> ja existe no remoto, a leitura
      # de hoje JA foi feita — nao rodamos de novo (era isso que empilhava commits
      # "leitura DATA" duplicados quando o cron e um "Run workflow" manual coincidiam).
      - name: Checar fila e idempotencia
        id: fila
        run: |
          DATE=$(date -u +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "claude/insights-$DATE" >/dev/null 2>&1; then
            echo "tem_fila=false" >> "$GITHUB_OUTPUT"
            echo "Branch claude/insights-$DATE ja existe — leitura de hoje feita, pulando."
          elif [ ! -f briefing/latest.md ]; then
            echo "tem_fila=false" >> "$GITHUB_OUTPUT"
            echo "Sem briefing/latest.md — pulando."
          elif grep -q "Nada pede leitura hoje" briefing/latest.md; then
            echo "tem_fila=false" >> "$GITHUB_OUTPUT"
            echo "Fila vazia — pulando (gate de custo)."
          else
            echo "tem_fila=true" >> "$GITHUB_OUTPUT"
            echo "Fila com item(ns) — chamando o Claude."
          fi

      - name: Claude le a fila e abre PR
        if: steps.fila.outputs.tem_fila == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Voce e o ANALISTA DIARIO do Commodities Radar. O dono e TRADER de soja, farelo
            e oleo degomado (opera long e short) — leitura NEUTRA de preco, NUNCA "comprador".

            Leia `system/prompts/routine_julgamento.txt` do repositorio e siga-o EXATAMENTE.
            Em resumo: leia `briefing/latest.md` (dump do dia + fila no fim) e produza a
            LEITURA COMPLETA E APROFUNDADA do dia — uma analise POR commodity (soja, farelo,
            oleo) explicando O QUE SUSTENTA cada tese (cada driver com numero + fonte + data
            e o mecanismo de mercado), o que a invalida, e a leitura operacional (long/short);
            mais a leitura de spreads/crush, a lente fiscal BR, riscos/eventos e uma secao de
            honestidade. Incorpore os gatilhos da fila citando o `id`. A DATA DE HOJE e
            ${{ steps.fila.outputs.date }} — use-a em tudo. Grave os insights em
            `insights/${{ steps.fila.outputs.date }}_<slug>.md` (frontmatter com `vies: [...]`).

            ENCANAMENTO (siga EXATO, isto evita conflito e commit empilhado):
            - Antes de escrever, rode `git fetch origin` e crie a branch SEMPRE a partir do
              main fresco: `git checkout -B claude/insights-${{ steps.fila.outputs.date }} origin/main`.
            - Toque SOMENTE em arquivos dentro de `insights/`. NUNCA edite .py, DB, config,
              indicators, briefing, nem este `.github/workflows/` — um PR claude/ que mexa
              fora de `insights/` e REPROVADO pelo guard.
            - Commit, push da branch `claude/insights-${{ steps.fila.outputs.date }}` e abra UM
              PR contra `main` com titulo "leitura ${{ steps.fila.outputs.date }}".

            PROFUNDIDADE e o objetivo — o dono reclamou de leitura rasa/seca. Use BASTANTE
            texto, explique o porque e o como, nao bullets soltos. Numeros sempre com fonte+data.
          claude_args: |
            --allowedTools Bash,Edit,Write,Read,Glob,Grep
            --max-turns 40
